title: Kerberoasting - RC4 Downgrade in Kerberos Service Ticket Request
id: c3d4e5f6-a7b8-9012-cdef-123456789012
status: test
description: |
    Detects Kerberoasting attacks by identifying Kerberos service ticket requests (TGS-REQ)
    that use RC4-HMAC encryption (0x17). Attackers request tickets for service accounts
    with SPNs using the weaker RC4 cipher to enable offline brute-force of the service
    account password hash. Modern environments should use AES-128/256.
references:
    - https://attack.mitre.org/techniques/T1558/003/
    - https://adsecurity.org/?p=2293
    - https://www.harmj0y.net/blog/powershell/kerberoasting-without-mimikatz/
    - https://github.com/GhostPack/Rubeus
author: Detection Engineering Team
date: 2024-01-15
modified: 2024-06-01
tags:
    - attack.credential-access
    - attack.t1558.003
logsource:
    product: windows
    service: security
detection:
    security:
        EventID: 4769
        Channel: Security
    selection_rc4:
        TicketEncryptionType: '0x17'    # RC4-HMAC — weak cipher indicating downgrade
    filter_machine_accounts:
        ServiceName|endswith: '$'       # Machine accounts always use RC4; exclude them
    filter_anonymous:
        ServiceName: 'krbtgt'           # Skip krbtgt TGT requests
    filter_local:
        IpAddress|startswith:
            - '127.'
            - '::1'
    condition: security and selection_rc4 and not (filter_machine_accounts or filter_anonymous or filter_local)
falsepositives:
    - Legacy applications that do not support AES Kerberos encryption
    - Services accounts with msDS-SupportedEncryptionTypes not configured for AES
    - Older Windows clients (pre-Vista) that default to RC4
level: high
ruletype: Sigma
