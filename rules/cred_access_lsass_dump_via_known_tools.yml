title: LSASS Memory Dump via Known Credential Dumping Tools
id: b2c3d4e5-f6a7-8901-bcde-f12345678901
status: test
description: |
    Detects execution of known tools used to dump LSASS process memory for credential
    harvesting. Covers both dedicated tools (Mimikatz, ProcDump with -ma flag against
    lsass) and LOLBin abuse (comsvcs.dll MiniDump, Task Manager dump).
references:
    - https://attack.mitre.org/techniques/T1003/001/
    - https://github.com/gentilkiwi/mimikatz
    - https://github.com/helpsystems/nanodump
    - https://github.com/CCob/MirrorDump
    - https://medium.com/@markmotig/some-ways-to-dump-lsass-exe-c4a75fdc49bf
author: Detection Engineering Team
date: 2024-01-15
modified: 2024-06-01
tags:
    - attack.credential-access
    - attack.t1003.001
logsource:
    category: process_creation
    product: windows
detection:
    process_creation:
        EventID: 1
        Channel: Microsoft-Windows-Sysmon/Operational
    selection_mimikatz:
        - Image|endswith:
              - '\mimikatz.exe'
              - '\mimilib.dll'
        - OriginalFileName|contains: 'mimikatz'
    selection_procdump_lsass:
        Image|endswith: '\procdump.exe'
        CommandLine|contains|all:
            - 'lsass'
            - '-ma'
    selection_comsvcs_minidump:
        CommandLine|contains|all:
            - 'comsvcs'
            - 'MiniDump'
            - 'lsass'
    selection_nanodump:
        - Image|endswith: '\nanodump.exe'
        - CommandLine|contains: 'nanodump'
    selection_createdump:
        Image|endswith:
            - '\createdump.exe'
            - '\sqldumper.exe'
        CommandLine|contains: 'lsass'
    selection_task_manager_dump:
        Image|endswith: '\taskmgr.exe'
        CommandLine|contains|all:
            - '/4'
            - 'lsass'
    condition: >
        process_creation and (
            selection_mimikatz or
            selection_procdump_lsass or
            selection_comsvcs_minidump or
            selection_nanodump or
            selection_createdump or
            selection_task_manager_dump
        )
falsepositives:
    - ProcDump used legitimately for application crash dumps (filter by target process)
    - Authorized red team or penetration testing activities
level: critical
ruletype: Sigma
